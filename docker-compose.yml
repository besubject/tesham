version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mettig-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-mettig}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mettig_dev_password}
      POSTGRES_DB: ${DB_NAME:-mettig}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mettig}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mettig-network

  minio:
    image: minio/minio:latest
    container_name: mettig-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mettig-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mettig-backend
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-mettig}
      DB_PASSWORD: ${DB_PASSWORD:-mettig_dev_password}
      DB_NAME: ${DB_NAME:-mettig}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-mettig-uploads}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_URL_EXPIRATION: 3600
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      SMS_RU_API_KEY: ${SMS_RU_API_KEY:-demo_key}
      WHATSAPP_BUSINESS_API_KEY: ${WHATSAPP_BUSINESS_API_KEY:-demo_key}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src
      - ./packages/shared/src:/app/packages/shared/src
    networks:
      - mettig-network
    command: npm run dev

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  mettig-network:
    driver: bridge
