version: '3.9'

# Изолированная тестовая БД для интеграционных тестов backend.
# Запуск:    docker compose -f docker-compose.test.yml up -d
# Остановка: docker compose -f docker-compose.test.yml down -v
#
# Полностью изолирована от dev: отдельный контейнер, отдельный том,
# отдельный порт (5434), отдельная БД (mettig_test).

services:
  postgres-test:
    image: postgis/postgis:16-3.4
    container_name: mettig-postgres-test
    environment:
      POSTGRES_USER: mettig_test
      POSTGRES_PASSWORD: mettig_test
      POSTGRES_DB: mettig_test
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5434:5432"
    volumes:
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    tmpfs:
      # Данные в памяти — тесты перезапускаются с чистой БД
      - /var/lib/postgresql/data:rw,size=512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mettig_test"]
      interval: 5s
      timeout: 3s
      retries: 10
